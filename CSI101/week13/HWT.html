<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array & Sum Even/Odd</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #FFF3E0; /* พื้นหลังสีส้มอ่อน */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 4px solid #FFB74D;
        }
        h2 { color: #E65100; }
        
        .input-group {
            margin-bottom: 20px;
            padding: 15px;
            background: #FFF8E1;
            border-radius: 10px;
        }
        
        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 60%;
        }
        
        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin-left: 5px;
            transition: 0.3s;
        }
        
        .btn-add { background-color: #29B6F6; color: white; }
        .btn-add:hover { background-color: #0288D1; }
        
        .btn-calc { 
            background-color: #66BB6A; 
            color: white; 
            width: 100%;
            margin-top: 10px;
            margin-left: 0;
            font-weight: bold;
        }
        .btn-calc:hover { background-color: #388E3C; }
        
        .array-display {
            margin: 20px 0;
            padding: 10px;
            border: 2px dashed #FFB74D;
            border-radius: 10px;
            color: #555;
            min-height: 24px;
        }

        .result-box {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .box {
            padding: 15px;
            border-radius: 10px;
            width: 45%;
            font-weight: bold;
        }
        .even-box { background-color: #E3F2FD; color: #1565C0; }
        .odd-box { background-color: #FFEBEE; color: #C62828; }

    </style>
</head>
<body>

    <div class="container">
        <h2>แบบฝึกหัด: Array & ผลรวม</h2>
        
        <div class="input-group">
            <label for="numberInput">กรอกเลขจำนวนเต็ม:</label><br><br>
            <input type="number" id="numberInput" placeholder="ใส่ตัวเลขที่นี่...">
            <button class="btn-add" onclick="addNumber()">เพิ่มเข้า Array</button>
        </div>

        <h3>ข้อมูลภายในอาร์เรย์ (Array)</h3>
        <div id="arrayOutput" class="array-display">
            []
        </div>

        <button class="btn-calc" onclick="calculateSums()">คำนวณหาผลบวก เลขคู่/คี่</button>

        <div class="result-box">
            <div class="box even-box">
                ผลรวมเลขคู่<br>
                <span id="sumEvenOutput" style="font-size: 24px;">0</span>
            </div>
            <div class="box odd-box">
                ผลรวมเลขคี่<br>
                <span id="sumOddOutput" style="font-size: 24px;">0</span>
            </div>
        </div>
    </div>

    <script>
        // ประกาศตัวแปร Array สำหรับเก็บข้อมูล (Global Scope)
        let numbers = [];

        // ฟังก์ชันสำหรับรับค่าและเพิ่มลง Array
        function addNumber() {
            const inputElement = document.getElementById('numberInput');
            const value = inputElement.value;

            // ตรวจสอบว่ามีการกรอกข้อมูลหรือไม่
            if (value === "") {
                alert("กรุณากรอกตัวเลขก่อนครับ");
                return;
            }

            // แปลงค่าจาก Text เป็น Integer (จำนวนเต็ม)
            const num = parseInt(value);

            // เก็บลง Array ด้วยคำสั่ง push()
            numbers.push(num);

            // แสดงข้อมูล Array บนหน้าจอทันที
            displayArray();

            // เคลียร์ช่อง input ให้ว่าง
            inputElement.value = "";
            inputElement.focus();
        }

        // ฟังก์ชันแสดงข้อมูลภายใน Array
        function displayArray() {
            const outputDiv = document.getElementById('arrayOutput');
            // ใช้ .join(', ') เพื่อเอาตัวเลขมาต่อกันคั่นด้วยลูกน้ำ
            outputDiv.innerHTML = `[ ${numbers.join(', ')} ]`;
        }

        // ฟังก์ชันคำนวณผลบวก (Logic หลัก)
        function calculateSums() {
            let sumEven = 0; // ตัวแปรเก็บผลรวมเลขคู่
            let sumOdd = 0;  // ตัวแปรเก็บผลรวมเลขคี่

            // วนลูปเช็คสมาชิกทุกตัวใน Array
            for (let i = 0; i < numbers.length; i++) {
                let currentNum = numbers[i];

                // เช็คเลขคู่ (หาร 2 ลงตัว เศษเป็น 0)
                if (currentNum % 2 === 0) {
                    sumEven += currentNum; 
                } 
                // ถ้าไม่ใช่เลขคู่ ก็คือเลขคี่
                else {
                    sumOdd += currentNum;
                }
            }

            // แสดงผลลัพธ์ออกมา
            document.getElementById('sumEvenOutput').innerText = sumEven;
            document.getElementById('sumOddOutput').innerText = sumOdd;
        }
    </script>
</body>
</html>
