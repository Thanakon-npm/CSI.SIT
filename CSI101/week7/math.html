<!DOCTYPE html>
<html lang="en">
  <head>
    <title></title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- <link href="css/style.css" rel="stylesheet" /> -->
    <script src="math.js"></script>
  </head>
  <body>
    <div>
      <label for="">Input : </label>
      <input type="number" id="number" />
    </div>
    <div>
      <button onclick="showPassword()">OK</button>
    </div>
    <label for="" id="result"></label>
    <script>
      function generatePassword(length) {
        let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎ()"; 
        let result = "";
        for (let i = 0; i < length; i++) {
          let index = Math.floor(Math.random() * chars.length);
          result += chars[index];
        }
        console.log(result);
        
        return result;
      }
      function showPassword() {
        const number = document.getElementById("number");
        const out = document.getElementById("result");
        let length = parseInt(number.value);
       
        if (isNaN(length) || length <= 0) {
          out.innerHTML = "กรุณากรอกจำนวนที่ถูกต้อง";
        }else{
          out.innerHTML = generatePassword(length);
        }
          return;
        }
      </script>
  </body>
</html>

</html>
