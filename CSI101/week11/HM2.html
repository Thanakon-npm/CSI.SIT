<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>สูตรคูณแม่ 2 ถึง 12</title>
  <style>
    body {
      font-family: "Kanit", sans-serif;
      background-color: #fff7cc;
      text-align: center;
      padding: 30px;
    }

    h1 {
      color: #ff6600;
    }

    button {
      margin-top: 10px;
      background-color: #ffb84d;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff9900;
    }

    pre {
      text-align: left;
      display: inline-block;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>สูตรคูณแม่ 2 ถึง แม่ 12</h1>
  <button onclick="showMultiplicationTable()">แสดงสูตรคูณ</button>

  <pre id="result"></pre>

  <script>function showMultiplicationTable() {
  let output = "";

  // วน loop จากแม่ 2 ถึงแม่ 12
  for (let i = 2; i <= 12; i++) {
    output += `แม่ ${i}\n`;
    // วนซ้ำคูณ 1 ถึง 12
    for (let j = 1; j <= 12; j++) {
      output += `${j} x ${i} = ${j * i}\n`;
    }
    output += "\n"; // เว้นบรรทัดระหว่างแต่ละแม่
  }

  document.getElementById("result").textContent = output;
}
</script>
</body>
</html>
