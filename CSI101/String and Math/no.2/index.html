    <label
      >ค่าไฟ (ยูนิต):

      <br>

      >ค่าโทรศัพท์ (นาที):

    </label>
      <br>
    <button onclick="calculate()">คำนวณ</button>

    <div id="result"></div>

    <script src="script.js"></script>
